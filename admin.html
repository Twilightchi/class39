<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - 2024级39班</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ========== 登录界面 ========== -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <h1>管理面板</h1>
      <p class="login-subtitle">乐陵一中2024级39班</p>
      <form id="loginForm">
        <label for="adminPassword">请输入管理密码</label>
        <input type="password" id="adminPassword" placeholder="输入密码..." autofocus>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn-login">登 录</button>
      </form>
    </div>
  </div>

  <!-- ========== 管理界面 ========== -->
  <div class="admin-wrapper" id="adminWrapper">
    <div class="admin-header">
      <h2>管理面板</h2>
      <button class="btn-logout" id="btnLogout">退出登录</button>
    </div>

    <div class="admin-body">
      <!-- 侧边标签 -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="heroBg">首页背景</button>
        <button class="admin-tab" data-tab="notices">公告管理</button>
        <button class="admin-tab" data-tab="honors">荣誉管理</button>
        <button class="admin-tab" data-tab="gallery">相册管理</button>
        <button class="admin-tab" data-tab="messages">留言管理+违禁词</button>
      </div>

      <!-- 内容区 -->
      <div class="admin-content">

        <!-- ===== 标签页1：首页背景 ===== -->
        <div class="admin-panel active" id="panel-heroBg">
          <h3>首页背景设置</h3>
          <p style="margin-bottom:16px;font-size:13px;color:#666;">预设渐变主题（点击选择）：</p>
          <div class="bg-presets">
            <div class="bg-preset bg-preset-1 selected" data-gradient="default" title="蓝绿渐变（默认）"></div>
            <div class="bg-preset bg-preset-2" data-gradient="purple" title="紫粉渐变"></div>
            <div class="bg-preset bg-preset-3" data-gradient="orange" title="橙黄渐变"></div>
            <div class="bg-preset bg-preset-4" data-gradient="cyan" title="青蓝渐变"></div>
            <div class="bg-preset bg-preset-5" data-gradient="green" title="绿翠渐变"></div>
            <div class="bg-preset bg-preset-6" data-gradient="pink" title="粉黄渐变"></div>
          </div>

          <p style="margin-bottom:12px;font-size:13px;color:#666;">或使用自定义背景：</p>
          <div class="admin-form">
            <div class="form-row">
              <input type="file" id="bgFileInput" accept="image/*" style="flex:0;">
              <span style="font-size:13px;color:#999;align-self:center;">上传背景图片</span>
            </div>
            <div class="form-row">
              <input type="text" id="bgUrlInput" placeholder="或输入图片URL地址">
              <button class="btn btn-primary" id="btnSaveUrl" style="flex:0;">使用URL</button>
            </div>
            <div style="margin-top:12px;">
              <p style="font-size:13px;color:#666;margin-bottom:8px;">预览效果：</p>
              <div id="bgPreview" style="width:100%;max-width:500px;aspect-ratio:16/10;border-radius:8px;background:linear-gradient(135deg,#667eea 0%,#4A90D9 30%,#5CB85C 60%,#F5A623 100%);background-size:400% 400%;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:700;overflow:hidden;">
                2024级39班
              </div>
            </div>
            <div style="margin-top:12px;display:flex;gap:8px;">
              <button class="btn btn-primary" id="btnSaveBg">保存背景设置</button>
              <button class="btn btn-danger" id="btnResetBg">恢复默认</button>
            </div>
          </div>
        </div>

        <!-- ===== 标签页2：公告管理 ===== -->
        <div class="admin-panel" id="panel-notices">
          <h3>公告管理</h3>
          <div class="admin-form">
            <form id="noticesForm">
              <div class="form-row">
                <input type="text" id="noticeTitle" placeholder="公告标题" required>
                <select id="noticeTag">
                  <option value="通知">通知</option>
                  <option value="重要">重要</option>
                  <option value="作业">作业</option>
                </select>
                <input type="date" id="noticeDate" required>
              </div>
              <textarea id="noticeContent" placeholder="公告内容" required></textarea>
              <div style="margin-top:10px;display:flex;gap:8px;">
                <button type="submit" class="btn btn-primary" id="noticeSubmit">添加公告</button>
                <button type="button" class="btn btn-danger" id="noticeCancel" style="display:none;">取消编辑</button>
              </div>
            </form>
          </div>
          <div class="admin-list" id="noticesList"></div>
        </div>

        <!-- ===== 标签页3：荣誉管理 ===== -->
        <div class="admin-panel" id="panel-honors">
          <h3>荣誉管理</h3>
          <div class="admin-form">
            <form id="honorsForm">
              <div class="form-row">
                <input type="text" id="honorTitle" placeholder="荣誉名称" required>
                <input type="text" id="honorYear" placeholder="获得时间（如：2025年度）" required>
              </div>
              <div style="margin-top:10px;display:flex;gap:8px;">
                <button type="submit" class="btn btn-primary" id="honorSubmit">添加荣誉</button>
                <button type="button" class="btn btn-danger" id="honorCancel" style="display:none;">取消编辑</button>
              </div>
            </form>
          </div>
          <div class="admin-list" id="honorsList"></div>
        </div>

        <!-- ===== 标签页4：相册管理 ===== -->
        <div class="admin-panel" id="panel-gallery">
          <h3>相册管理</h3>
          <div class="admin-form">
            <form id="galleryForm">
              <div class="form-row">
                <input type="text" id="galleryTitle" placeholder="照片标题" required>
                <select id="galleryCat">
                  <option value="study">学习时光</option>
                  <option value="sports">运动风采</option>
                  <option value="activity">班级活动</option>
                </select>
              </div>
              <div class="form-row">
                <input type="file" id="galleryFile" accept="image/*" style="flex:0;">
                <span style="font-size:12px;color:#999;align-self:center;">或</span>
                <input type="text" id="galleryUrl" placeholder="输入图片URL地址">
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top:8px;">添加照片</button>
            </form>
          </div>
          <div class="gallery-mini-grid" id="galleryMiniGrid"></div>
        </div>

        <!-- ===== 标签页5：留言管理 + 违禁词 ===== -->
        <div class="admin-panel" id="panel-messages">
          <h3>留言管理</h3>
          <div class="admin-list" id="adminMsgList" style="margin-bottom:24px;"></div>

          <h3 style="margin-top:8px;">违禁词管理</h3>
          <p style="font-size:13px;color:#666;margin-bottom:12px;">添加后，留言内容含违禁词将被拦截</p>
          <div class="admin-form">
            <form id="bannedWordForm">
              <div class="form-row">
                <input type="text" id="bannedWordInput" placeholder="输入违禁词" required>
                <button type="submit" class="btn btn-primary" style="flex:0;">添加违禁词</button>
              </div>
            </form>
            <div class="banned-words-list" id="bannedWordsList"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js?v=4"></script>
  <script src="admin.js?v=4"></script>
</body>
</html>
